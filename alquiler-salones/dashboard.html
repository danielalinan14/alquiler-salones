<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - RUK'UX KAJ</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar-glass">
        <div class="nav-container">
            <div class="logo-nav" onclick="window.location.href='index.html'">
                <img src="assets/logo.png" alt="RUK'UX KAJ" class="nav-logo" onerror="this.style.display='none'">
            </div>
            <div class="nav-links">
                <a href="index.html">🏠 Inicio</a>
                <a href="dashboard.html">📋 Mis Reservas</a>
                <div class="user-icon" id="user-icon">
                    <span id="user-inicial">👤</span>
                </div>
                <button onclick="cerrarSesion()">🚪 Salir</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h2>📋 Mis Reservas</h2>
        <div id="reservas-container" class="reservas-list">
            <div class="loading">Cargando tus reservas...</div>
        </div>
    </div>
    
    <script src="js/supabase-client.js"></script>
    <script>
        async function cargarMisReservas() {
            const user = await getUsuarioActual();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            const { data: reservas, error } = await supabase
                .from('reservas')
                .select(`
                    *,
                    salones (nombre, capacidad, precio_por_hora)
                `)
                .eq('usuario_id', user.id)
                .order('fecha', { ascending: true });
            
            if (error) {
                console.error('Error:', error);
                document.getElementById('reservas-container').innerHTML = 
                    '<p class="error">Error al cargar reservas</p>';
                return;
            }
            
            const container = document.getElementById('reservas-container');
            
            if (!reservas.length) {
                container.innerHTML = `
                    <div class="no-reservas">
                        <p>✨ No tienes reservas aún</p>
                        <a href="index.html" class="btn-primary">Explorar Salones</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = reservas.map(reserva => `
                <div class="reserva-card">
                    <div class="reserva-header">
                        <h3>${reserva.salones.nombre}</h3>
                        <span class="estado ${reserva.estado}">${reserva.estado}</span>
                    </div>
                    <div class="reserva-body">
                        <p><strong>📅 Fecha:</strong> ${reserva.fecha}</p>
                        <p><strong>⏰ Horario:</strong> ${reserva.hora_inicio} - ${reserva.hora_fin}</p>
                        <p><strong>💰 Precio:</strong> Q${reserva.salones.precio_por_hora}/hora</p>
                        <p><strong>Código pago:</strong> ${reserva.codigo_pago || 'Sin código'}</p>
                    </div>
                    ${reserva.estado === 'confirmada' ? `
                        <button onclick="cancelarMiReserva(${reserva.id})" class="btn-cancelar">
                            Cancelar Reserva
                        </button>
                    ` : ''}
                </div>
            `).join('');
        }
        
        async function cancelarMiReserva(reservaId) {
            if (!confirm('¿Cancelar esta reserva?')) return;
            
            const { error } = await supabase
                .from('reservas')
                .update({ estado: 'cancelada' })
                .eq('id', reservaId);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('✅ Reserva cancelada');
                cargarMisReservas();
            }
        }
        
        cargarMisReservas();
    </script>
</body>
</html>
