<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUK'UX KAJ - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo.png" alt="RUK'UX KAJ" class="logo" onerror="this.style.display='none'">
                <h2>RUK'UX KAJ</h2>
                <p class="subtitle">El corazón de nuestro cielo</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="mostrarTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="mostrarTab('registro')">Registrarse</button>
            </div>
            
            <div id="login-tab" class="tab-content active">
                <form id="login-form" onsubmit="event.preventDefault()">
                    <div class="input-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="login-email" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="button" onclick="iniciarSesion()" class="btn-primary">Acceder</button>
                    <div id="login-message" class="message"></div>
                </form>
            </div>
            
            <div id="registro-tab" class="tab-content">
                <form id="registro-form" onsubmit="event.preventDefault()">
                    <div class="input-group">
                        <label>Nombre completo</label>
                        <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
                    </div>
                    <div class="input-group">
                        <label>Teléfono</label>
                        <input type="tel" id="reg-telefono" placeholder="1234-5678" required>
                    </div>
                    <div class="input-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                    </div>
                    <button type="button" onclick="registrarse()" class="btn-primary">Registrarse</button>
                    <div id="registro-message" class="message"></div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
